<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Wen's Chinese Classroom</title>

    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="classroom-stage" aria-label="Mr Wen's Chinese Classroom homepage">
        <img src="classroom-home.png" alt="" class="classroom-image">

        <section class="whiteboard-menu" aria-label="Classroom app menu">

            <a class="app-tile" href="vocab-flashcard/index.html">
                <span class="app-icon">📘</span>
                <span class="app-title">Vocabulary Flashcards</span>
                <span class="app-subtitle">Review Chinese words</span>

            <a class="app-tile" href="vocab-challenge/index.html">
                <span class="app-icon">⚡</span>
                <span class="app-title">Vocabulary Challenges</span>
                <span class="app-subtitle">Beat the timer</span>
            </a>

            <div class="app-tile coming-soon">
                <span class="app-icon">📖</span>
                <span class="app-title">Chinese Reading</span>
                <span class="app-subtitle">Coming Soon</span>
            </div>

            <div class="app-tile coming-soon">
                <span class="app-icon">🎮</span>

                <span class="app-subtitle">Coming Soon</span>
