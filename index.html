<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chinese Vocabulary Flashcards</title>
  <link rel="stylesheet" href="style.css?v=2026-06-10">
</head>

<body>
  <main class="app">
    <header>
      <h1>Chinese Vocabulary Flashcards</h1>
      <p>Year 10 Chinese - Topic 2 Vocabulary</p>
      <p class="developer-credit">Developed by Mr Wen</p>
    </header>

    <section class="flashcard" aria-label="Flashcard">
      <div class="card-number" id="cardNumber" aria-live="polite"></div>

<!-- Pinyin sits above Hanzi -->
<div class="answer-box hidden pinyin-top" id="pinyinBox" aria-hidden="true">
  <span id="pinyin">nǐ hǎo</span>
</div>

<!-- lang helps devices choose appropriate fonts/reading rules -->
<div class="hanzi" id="hanzi" lang="zh-Hans">你好</div>

<!-- Keep English in the answer area below -->
<div class="answer-area" aria-label="Answers">
  <div class="answer-box hidden" id="englishBox" aria-hidden="true">
    <span class="label">English</span>
    <span id="english">hello</span>
  </div>
</div>
      <div class="button-row">
        <button type="button" id="togglePinyinBtn" aria-controls="pinyinBox">Reveal Pinyin</button>
        <button type="button" id="toggleEnglishBtn" aria-controls="englishBox">Reveal English</button>
      </div>

      <div class="button-row secondary-row">
        <button type="button" id="shuffleBtn">Shuffle Deck</button>
        <button type="button" id="restartBtn">Restart</button>
      </div>

      <div class="navigation">
        <button type="button" id="prevBtn">← Previous</button>
        <button type="button" id="nextBtn">Next →</button>
      </div>

      <p class="keyboard-tip">
        Keyboard: ← / → to move • P for pinyin • E for English
      </p>
    </section>

    <footer>
      <p>Tip: Try saying the word before revealing the pinyin or English.</p>
    </footer>
  </main>

  <script src="vocab-data.js?v=2026-06-10"></script>
  <script src="script.js?v=2026-06-10"></script>

</body>
</html>
